name: status
region: fra

services:
  - name: api
    github:
      repo: akaderkin/status
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npm run build:backend
    run_command: npm run start
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: "production"
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: ENCRYPTION_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ADMIN_EMAIL
        scope: RUN_TIME
        type: SECRET
      - key: ADMIN_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: CORS_ORIGIN
        value: "*"
      - key: PUBLIC_API_URL
        scope: RUN_TIME
        type: GENERAL
      - key: STATUS_API_URL
        scope: RUN_TIME
        type: GENERAL
      - key: AGENT_STALE_MS
        value: "120000"

workers:
  - name: worker
    github:
      repo: akaderkin/status
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npm run build:backend
    run_command: npm run start:worker
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NODE_ENV
        value: "production"
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: ENCRYPTION_KEY
        scope: RUN_TIME
        type: SECRET
      - key: KUMA_POLL_INTERVAL_MS
        value: "30000"
      - key: IMAP_POLL_INTERVAL_MS
        value: "60000"
