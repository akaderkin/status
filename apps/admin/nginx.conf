server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location /admin/ {
    proxy_pass http://api:3000/admin/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location /v1/ {
    proxy_pass http://api:3000/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location /health {
    proxy_pass http://api:3000/health;
  }

  location / {
    try_files $uri /index.html;
  }
}
