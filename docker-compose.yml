services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: status
      POSTGRES_PASSWORD: status
      POSTGRES_DB: status
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U status"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://status:status@postgres:5432/status?schema=public
      REDIS_URL: redis://redis:6379
      API_HOST: 0.0.0.0
      API_PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://status:status@postgres:5432/status?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

  # Optional: run a local probe node in compose
  # agent:
  #   build:
  #     context: apps/agent
  #   environment:
  #     STATUS_API_URL: http://api:3000
  #     NODE_TOKEN: sn_from_admin
  #   depends_on:
  #     - api

volumes:
  postgres_data:
